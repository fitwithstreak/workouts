<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Stretch & Mobility</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.home{
color:white;
text-decoration:none;
background:#1e293b;
padding:6px 12px;
border-radius:6px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.section{
margin-bottom:50px;
}

.section h2{
border-bottom:1px solid #334155;
padding-bottom:6px;
margin-bottom:18px;
}

.exercise{
margin-bottom:26px;
cursor:pointer;
position:relative;
}

.exercise img{
width:100%;
border-radius:12px;
}

.badge{
position:absolute;
top:10px;
right:10px;
background:#22c55e;
padding:6px 10px;
border-radius:6px;
font-size:12px;
display:none;
}

.history{
background:#1e293b;
padding:10px;
border-radius:8px;
margin-top:8px;
display:none;
}

/* MAIN IMAGE */

.mainImage img{
width:100%;
border-radius:12px;
margin-bottom:30px;
}


</style>

</head>

<body>

<header>
<h2>Stretch & Mobility</h2>
<a href="index.html" class="home">Home</a>
</header>

<div class="container">


    <!-- MAIN IMAGE -->

<div class="mainImage">

<img src="images/streaching.png">

</div>



<!-- SPINE -->

<div class="section">
<h2>Spine / Thoracic Mobility</h2>

<div class="exercise" data-exercise="sp1"><img src="images/Streach/First-of-the-stretch-exercises-cat-cow-1024x575.jpg"><div class="badge">DONE</div><div class="history"></div></div>
<div class="exercise" data-exercise="sp2"><img src="images/Streach/How-to-do-thoracic-cat-cows-1024x571.jpg"><div class="badge">DONE</div><div class="history"></div></div>
<div class="exercise" data-exercise="sp3"><img src="images/Streach/Half-kneeling-thoracic-rotations-1024x576.jpg"><div class="badge">DONE</div><div class="history"></div></div>
<div class="exercise" data-exercise="sp4"><img src="images/Streach/How-to-fix-your-posture-thoracic-extension-mobilization-1024x576.jpg"><div class="badge">DONE</div><div class="history"></div></div>
<div class="exercise" data-exercise="sp5"><img src="images/Streach/Thoracic-extension-mobilization-to-fix-posture-1024x572.jpg"><div class="badge">DONE</div><div class="history"></div></div>

</div>

<!-- SHOULDERS -->

<div class="section">
<h2>Shoulders & Upper Back</h2>

<div class="exercise" data-exercise="sh1"><img src="images/Streach/Wall-slides-1024x576.jpg"><div class="badge">DONE</div><div class="history"></div></div>
<div class="exercise" data-exercise="sh2"><img src="images/Streach/How-to-perform-the-shoulder-dislocations-correctly-to-straighten-your-back-1024x574.jpg"><div class="badge">DONE</div><div class="history"></div></div>
<div class="exercise" data-exercise="sh3"><img src="images/Streach/Pull-aparts-are-one-of-the-best-exercises-you-could-do-to-straighten-your-back-1024x575.jpg"><div class="badge">DONE</div><div class="history"></div></div>

</div>

<!-- HIPS -->

<div class="section">
<h2>Hip Mobility</h2>

<div class="exercise" data-exercise="hip1"><img src="images/Streach/How-to-mobilize-the-hips-1024x573.jpg"><div class="badge">DONE</div><div class="history"></div></div>
<div class="exercise" data-exercise="hip2"><img src="images/Streach/How-to-perform-the-hip-airplanes-1024x573.jpg"><div class="badge">DONE</div><div class="history"></div></div>
<div class="exercise" data-exercise="hip3"><img src="images/Streach/Posture-correction-routine-exercise-pigeon-stretch-1024x573.jpg"><div class="badge">DONE</div><div class="history"></div></div>

</div>

<!-- ANKLE -->

<div class="section">
<h2>Ankles & Knees</h2>

<div class="exercise" data-exercise="ank1"><img src="images/Streach/How-to-mobilize-ankles-with-the-combat-stretch-1024x574.jpg"><div class="badge">DONE</div><div class="history"></div></div>
<div class="exercise" data-exercise="ank2"><img src="images/Streach/Ankle-mobility-test-to-determine-suitable-knee-exercises-1024x575.jpg"><div class="badge">DONE</div><div class="history"></div></div>

</div>

<!-- FULL BODY -->

<div class="section">
<h2>Full Body Mobility</h2>

<div class="exercise" data-exercise="fb1"><img src="images/Streach/Worlds-greatest-stretch-1024x576.jpg"><div class="badge">DONE</div><div class="history"></div></div>
<div class="exercise" data-exercise="fb2"><img src="images/Streach/How-to-perform-one-of-the-best-stretch-exercises-the-Asian-squat-1024x576.jpg"><div class="badge">DONE</div><div class="history"></div></div>

</div>

</div>

<script>

let items=document.querySelectorAll(".exercise")

items.forEach(el=>{

let clicks=0

el.addEventListener("click",function(){

clicks++

setTimeout(()=>{

if(clicks===1){
showHistory(el)
}

if(clicks===3){
markDone(el)
}

clicks=0

},300)

})

})

function markDone(el){

let name=el.dataset.exercise
let data=JSON.parse(localStorage.getItem(name))||[]

let today=new Date().toISOString().split("T")[0]

data.push(today)
localStorage.setItem(name,JSON.stringify(data))

let badge=el.querySelector(".badge")
if(badge) badge.style.display="block"

}

function showHistory(el){

let name=el.dataset.exercise
let box=el.querySelector(".history")

let data=JSON.parse(localStorage.getItem(name))||[]

let twoWeeksAgo=new Date()
twoWeeksAgo.setDate(twoWeeksAgo.getDate()-14)

let recent=data.filter(d=>new Date(d)>twoWeeksAgo)

if(recent.length===0){
box.innerHTML="No sessions last 2 weeks"
}else{
box.innerHTML="Last 2 weeks:<br>"+recent.join("<br>")
}

box.style.display="block"

setTimeout(()=>{
box.style.display="none"
},3000)

}

</script>

</body>
</html>
