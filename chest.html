<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Chest Exercises</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.section{
margin-bottom:40px;
}

.section h2{
margin-bottom:16px;
}

.exercise{
margin-bottom:22px;
cursor:pointer;
position:relative;
}

.exercise img{
width:100%;
border-radius:12px;
}

.badge{
position:absolute;
top:10px;
right:10px;
background:#22c55e;
padding:6px 10px;
border-radius:6px;
font-size:12px;
display:none;
}

.history{
background:#1e293b;
padding:10px;
border-radius:8px;
margin-top:8px;
display:none;
}


/* MAIN IMAGE */

.mainImage img{
width:100%;
border-radius:12px;
margin-bottom:30px;
}

</style>

</head>

<body>

<header>Chest Exercises</header>

<div class="container">


    <!-- MAIN IMAGE -->

<div class="mainImage">

<img src="images/chest.png">

</div>



<!-- UPPER CHEST -->

<div class="section">

<h2>Upper Chest</h2>

<div class="exercise" data-exercise="incline_dumbbell_press">

<img src="images/Chest/How-to-perform-the-incline-dumbbell-bench-press-1024x578.png">

<div class="badge">DONE</div>

<div class="history"></div>

</div>

<div class="exercise" data-exercise="incline_dumbbell_flyes">

<img src="images/Chest/Hit-the-upper-chest-with-dumbbell-chest-flyes-768x431.png">


<div class="badge">DONE</div>

<div class="history"></div>

</div>

</div>

<!-- MIDDLE CHEST -->

<div class="section">

<h2>Middle Chest</h2>

<div class="exercise" data-exercise="chest_fly_build">

<img src="images/Chest/How-to-build-a-well-developed-chest-with-chest-flyes.gif">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

<div class="exercise" data-exercise="cable_fly_line">

<img src="images/Chest/Align-line-of-force-on-the-cable-chest-flyes.gif">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

<div class="exercise" data-exercise="fly_form">

<img src="images/Chest/Proper-form-on-all-three-versions-of-the-chest-flyes.gif">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

<div class="exercise" data-exercise="prevent_round">

<img src="images/Chest/Prevent-your-shoulders-from-rounding-on-the-chest-flyes.gif">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

<div class="exercise" data-exercise="chest_function">

<img src="images/Chest/Think-about-the-function-of-the-chest-on-the-chest-flyes.gif">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

<div class="exercise" data-exercise="straighter_arms">

<img src="images/Chest/Straighter-arms-on-the-chest-flyes-increase-bicep-activation.gif">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

</div>

<!-- LOWER CHEST -->

<div class="section">

<h2>Lower Chest</h2>

<div class="exercise" data-exercise="lower_dumbbell_fly">

<img src="images/Chest/Hit-the-lower-chest-with-dumbbell-chest-flyes-768x431.png">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

</div>

<!-- TECHNIQUE -->

<div class="section">

<h2>Technique</h2>

<div class="exercise" data-exercise="activation_profile">

<img src="images/Chest/Chest-activation-in-relation-to-resistance-profile-768x431.png">

<div class="history"></div>

</div>

<div class="exercise" data-exercise="elbow_bend">

<img src="images/Chest/Elbow-bend-on-chest-flyes-affect-chest-activation-768x432.png">

<div class="history"></div>

</div>

<div class="exercise" data-exercise="line_force">

<img src="images/Chest/Maintain-proper-line-of-force-on-all-chest-flyes-768x432.png">

<div class="history"></div>

</div>

<div class="exercise" data-exercise="shoulder_cable">

<img src="images/Chest/Do-not-let-your-shoulders-round-forward-on-the-cable-chest-flyes-768x432.png">

<div class="history"></div>

</div>

<div class="exercise" data-exercise="shoulder_machine">

<img src="images/Chest/Do-not-let-your-shoulders-round-forward-on-the-machine-chest-flyes-768x433.png">

<div class="history"></div>

</div>

<div class="exercise" data-exercise="close_grip">

<img src="images/Chest/Compound-exercises-close-grip-bench-press-1024x576.png">

<div class="history"></div>

</div>

</div>

</div>

<script>

let items=document.querySelectorAll(".exercise")

items.forEach(el=>{

let clicks=0

el.addEventListener("click",function(){

clicks++

setTimeout(()=>{

if(clicks===1){
showHistory(el)
}

if(clicks===3){
markDone(el)
}

clicks=0

},300)

})

})

function markDone(el){

let name=el.dataset.exercise

let data=JSON.parse(localStorage.getItem(name))||[]

let today=new Date().toISOString().split("T")[0]

data.push(today)

localStorage.setItem(name,JSON.stringify(data))

let badge=el.querySelector(".badge")

if(badge) badge.style.display="block"

}

function showHistory(el){

let name=el.dataset.exercise

let box=el.querySelector(".history")

let data=JSON.parse(localStorage.getItem(name))||[]

let twoWeeksAgo=new Date()

twoWeeksAgo.setDate(twoWeeksAgo.getDate()-14)

let recent=data.filter(d=>new Date(d)>twoWeeksAgo)

if(recent.length===0){
box.innerHTML="No workouts last 2 weeks"
}else{
box.innerHTML="Last 2 weeks:<br>"+recent.join("<br>")
}

box.style.display="block"

setTimeout(()=>{
box.style.display="none"
},3000)

}

</script>

</body>
</html>
