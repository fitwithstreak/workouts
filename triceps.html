<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Triceps Exercises</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.home{
color:white;
text-decoration:none;
background:#1e293b;
padding:6px 12px;
border-radius:6px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.section{
margin-bottom:50px;
}

.section h2{
border-bottom:1px solid #334155;
padding-bottom:6px;
margin-bottom:18px;
}

.exercise{
margin-bottom:26px;
cursor:pointer;
position:relative;
}

.exercise img{
width:100%;
border-radius:12px;
}

.badge{
position:absolute;
top:10px;
right:10px;
background:#22c55e;
padding:6px 10px;
border-radius:6px;
font-size:12px;
display:none;
}

.history{
background:#1e293b;
padding:10px;
border-radius:8px;
margin-top:8px;
display:none;
}


/* MAIN IMAGE */

.mainImage img{
width:100%;
border-radius:12px;
margin-bottom:30px;
}

</style>

</head>

<body>

<header>
<h2>Triceps Exercises</h2>
<a href="index.html" class="home">Home</a>
</header>

<div class="container">

    <!-- MAIN IMAGE -->

<div class="mainImage">

<img src="images/triceps.png">

</div>

<!-- LONG HEAD -->

<div class="section">

<h2>Long Head (Overhead Work)</h2>

<div class="exercise" data-exercise="tricep1">

<img src="images/Arms/Cable-overhead-extensions-in-arm-workout-1024x576.png">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

</div>

<!-- LATERAL HEAD -->

<div class="section">

<h2>Lateral Head</h2>

<div class="exercise" data-exercise="tricep2">

<img src="images/Arms/Lateral-head-extensions-in-arm-workout-1024x574.png">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

</div>

<!-- COMPOUND -->

<div class="section">

<h2>Compound Triceps Movements</h2>

<div class="exercise" data-exercise="tricep3">

<img src="images/Arms/How-to-perform-the-JM-press-in-your-arm-workout-1024x576.png">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

<div class="exercise" data-exercise="tricep4">

<img src="images/Arms/JM-press-as-an-alternative-in-your-arm-workout-1024x576.png">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

</div>

<!-- GUIDANCE -->

<div class="section">

<h2>Workout Guidance</h2>

<div class="exercise" data-exercise="tricep5">

<img src="images/Arms/Complete-arm-workout-routine-1024x578.png">

<div class="history"></div>

</div>

</div>

</div>

<script>

let items=document.querySelectorAll(".exercise")

items.forEach(el=>{

let clicks=0

el.addEventListener("click",function(){

clicks++

setTimeout(()=>{

if(clicks===1){
showHistory(el)
}

if(clicks===3){
markDone(el)
}

clicks=0

},300)

})

})

function markDone(el){

let name=el.dataset.exercise

let data=JSON.parse(localStorage.getItem(name))||[]

let today=new Date().toISOString().split("T")[0]

data.push(today)

localStorage.setItem(name,JSON.stringify(data))

let badge=el.querySelector(".badge")

if(badge) badge.style.display="block"

}

function showHistory(el){

let name=el.dataset.exercise

let box=el.querySelector(".history")

let data=JSON.parse(localStorage.getItem(name))||[]

let twoWeeksAgo=new Date()

twoWeeksAgo.setDate(twoWeeksAgo.getDate()-14)

let recent=data.filter(d=>new Date(d)>twoWeeksAgo)

if(recent.length===0){
box.innerHTML="No workouts last 2 weeks"
}else{
box.innerHTML="Last 2 weeks:<br>"+recent.join("<br>")
}

box.style.display="block"

setTimeout(()=>{
box.style.display="none"
},3000)

}

</script>

</body>
</html>
