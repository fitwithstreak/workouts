<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Abs Exercises</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.home{
color:white;
text-decoration:none;
background:#1e293b;
padding:6px 12px;
border-radius:6px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.section{
margin-bottom:50px;
}

.section h2{
border-bottom:1px solid #334155;
padding-bottom:6px;
margin-bottom:18px;
}

.exercise{
margin-bottom:26px;
cursor:pointer;
position:relative;
}

.exercise img{
width:100%;
border-radius:12px;
}

.badge{
position:absolute;
top:10px;
right:10px;
background:#22c55e;
padding:6px 10px;
border-radius:6px;
font-size:12px;
display:none;
}

.history{
background:#1e293b;
padding:10px;
border-radius:8px;
margin-top:8px;
display:none;
}


/* MAIN IMAGE */

.mainImage img{
width:100%;
border-radius:12px;
margin-bottom:30px;
}


</style>

</head>

<body>

<header>
<h2>Abs Exercises</h2>
<a href="index.html" class="home">Home</a>
</header>

<div class="container">

    <!-- MAIN IMAGE -->

<div class="mainImage">

<img src="images/abs.png">

</div>


<!-- UPPER ABS -->

<div class="section">

<h2>Upper Abs</h2>

<div class="exercise" data-exercise="upper1">

<img src="images/Abs/Crunches-for-upper-abs-six-pack-abs-1024x576.png">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

<div class="exercise" data-exercise="upper2">

<img src="images/Abs/Add-ab-mat-on-crunches-to-increase-stretch-six-pack-abs-1024x576.png">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

</div>

<!-- LOWER ABS -->

<div class="section">

<h2>Lower Abs</h2>

<div class="exercise" data-exercise="lower1">

<img src="images/Abs/How-to-get-six-pack-abs-with-reverse-crunches-1024x576.png">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

<div class="exercise" data-exercise="lower2">

<img src="images/Abs/Six-pack-abs-reverse-crunches-progression-1024x576.png">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

<div class="exercise" data-exercise="lower3">

<img src="images/Abs/Six-pack-abs-increase-stretch-of-reverse-crunches-with-an-ab-mat-1024x576.png">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

<div class="exercise" data-exercise="lower4">

<img src="images/Abs/Execution-tip-for-the-leg-raises-1024x574.jpg">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

</div>

<!-- OBLIQUES -->

<div class="section">

<h2>Obliques</h2>

<div class="exercise" data-exercise="oblique1">

<img src="images/Abs/How-to-perform-the-Russian-Twists-1024x575.jpg">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

<div class="exercise" data-exercise="oblique2">

<img src="images/Abs/Russian-Twists-torso-lean-1024x575.jpg">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

</div>

<!-- CORE -->

<div class="section">

<h2>Core Stability</h2>

<div class="exercise" data-exercise="core1">

<img src="images/Abs/How-to-perform-the-ab-roll-out-when-doing-an-at-home-abs-workout-1024x571.jpg">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

</div>

<!-- GUIDANCE -->

<div class="section">

<h2>Workout Guidance</h2>

<div class="exercise" data-exercise="guide1">

<img src="images/Abs/Top-down-exercise-options-1024x576.jpg">

<div class="history"></div>

</div>

</div>

</div>

<script>

let items=document.querySelectorAll(".exercise")

items.forEach(el=>{

let clicks=0

el.addEventListener("click",function(){

clicks++

setTimeout(()=>{

if(clicks===1){
showHistory(el)
}

if(clicks===3){
markDone(el)
}

clicks=0

},300)

})

})

function markDone(el){

let name=el.dataset.exercise

let data=JSON.parse(localStorage.getItem(name))||[]

let today=new Date().toISOString().split("T")[0]

data.push(today)

localStorage.setItem(name,JSON.stringify(data))

let badge=el.querySelector(".badge")

if(badge) badge.style.display="block"

}

function showHistory(el){

let name=el.dataset.exercise

let box=el.querySelector(".history")

let data=JSON.parse(localStorage.getItem(name))||[]

let twoWeeksAgo=new Date()

twoWeeksAgo.setDate(twoWeeksAgo.getDate()-14)

let recent=data.filter(d=>new Date(d)>twoWeeksAgo)

if(recent.length===0){
box.innerHTML="No workouts last 2 weeks"
}else{
box.innerHTML="Last 2 weeks:<br>"+recent.join("<br>")
}

box.style.display="block"

setTimeout(()=>{
box.style.display="none"
},3000)

}

</script>

</body>
</html>
