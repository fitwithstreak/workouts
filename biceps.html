<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Biceps Exercises</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.home{
color:white;
text-decoration:none;
background:#1e293b;
padding:6px 12px;
border-radius:6px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.section{
margin-bottom:50px;
}

.section h2{
border-bottom:1px solid #334155;
padding-bottom:6px;
margin-bottom:18px;
}

.exercise{
margin-bottom:26px;
cursor:pointer;
position:relative;
}

.exercise img{
width:100%;
border-radius:12px;
}

.badge{
position:absolute;
top:10px;
right:10px;
background:#22c55e;
padding:6px 10px;
border-radius:6px;
font-size:12px;
display:none;
}

.history{
background:#1e293b;
padding:10px;
border-radius:8px;
margin-top:8px;
display:none;
}


/* MAIN IMAGE */

.mainImage img{
width:100%;
border-radius:12px;
margin-bottom:30px;
}

</style>

</head>

<body>

<header>
<h2>Biceps Exercises</h2>
<a href="index.html" class="home">Home</a>
</header>

<div class="container">


    <!-- MAIN IMAGE -->

<div class="mainImage">

<img src="images/biceps.png">

</div>

<!-- MAIN EXERCISES -->



<div class="section">

<h2>Main Biceps Exercises</h2>

<div class="exercise" data-exercise="preacher1">

<img src="images/Arms/How-to-perform-preacher-curls-in-an-arm-workout-for-more-growth-1024x575.png">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

<div class="exercise" data-exercise="preacher2">

<img src="images/Arms/How-to-perform-preacher-curls-in-arm-workout-for-more-growth-2-1024x576.png">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

</div>

<!-- HAMMER CURL VARIATIONS -->

<div class="section">

<h2>Hammer Curl Variations</h2>

<div class="exercise" data-exercise="hammer1">

<img src="images/Arms/Behind-the-body-hammer-cable-curls-in-arm-workout-1024x578.png">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

<div class="exercise" data-exercise="hammer2">

<img src="images/Arms/Use-a-bench-for-hammer-curls-in-arm-workout-for-more-growth-1024x576.png">

<div class="badge">DONE</div>
<div class="history"></div>

</div>

</div>

<!-- TECHNIQUE -->

<div class="section">

<h2>Technique / What Not To Do</h2>

<div class="exercise" data-exercise="tech1">

<img src="images/Arms/Avoid-letting-your-elbows-move-closer-to-the-body-as-you-perform-the-curls-1024x575.jpg">

<div class="history"></div>

</div>

<div class="exercise" data-exercise="tech2">

<img src="images/Arms/Avoid-using-excessive-momentum-on-the-hammer-curls-1024x575.jpg">

<div class="history"></div>

</div>

<div class="exercise" data-exercise="tech3">

<img src="images/Arms/Resist-the-urge-to-let-your-elbows-move-back-toward-your-body-as-you-curl-the-weight-up-1024x577.jpg">

<div class="history"></div>

</div>

</div>

</div>

<script>

let items=document.querySelectorAll(".exercise")

items.forEach(el=>{

let clicks=0

el.addEventListener("click",function(){

clicks++

setTimeout(()=>{

if(clicks===1){
showHistory(el)
}

if(clicks===3){
markDone(el)
}

clicks=0

},300)

})

})

function markDone(el){

let name=el.dataset.exercise

let data=JSON.parse(localStorage.getItem(name))||[]

let today=new Date().toISOString().split("T")[0]

data.push(today)

localStorage.setItem(name,JSON.stringify(data))

let badge=el.querySelector(".badge")

if(badge) badge.style.display="block"

}

function showHistory(el){

let name=el.dataset.exercise

let box=el.querySelector(".history")

let data=JSON.parse(localStorage.getItem(name))||[]

let twoWeeksAgo=new Date()

twoWeeksAgo.setDate(twoWeeksAgo.getDate()-14)

let recent=data.filter(d=>new Date(d)>twoWeeksAgo)

if(recent.length===0){
box.innerHTML="No workouts last 2 weeks"
}else{
box.innerHTML="Last 2 weeks:<br>"+recent.join("<br>")
}

box.style.display="block"

setTimeout(()=>{
box.style.display="none"
},3000)

}

</script>

</body>
</html>
