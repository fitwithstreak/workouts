<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shoulder Exercises</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.home{
color:white;
text-decoration:none;
background:#1e293b;
padding:6px 12px;
border-radius:6px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.section{
margin-bottom:50px;
}

.section h2{
border-bottom:1px solid #334155;
padding-bottom:6px;
margin-bottom:18px;
}

.exercise{
margin-bottom:26px;
cursor:pointer;
position:relative;
}

.exercise img{
width:100%;
border-radius:12px;
}

.badge{
position:absolute;
top:10px;
right:10px;
background:#22c55e;
padding:6px 10px;
border-radius:6px;
font-size:12px;
display:none;
}

.history{
background:#1e293b;
padding:10px;
border-radius:8px;
margin-top:8px;
display:none;
}

/* MAIN IMAGE */

.mainImage img{
width:100%;
border-radius:12px;
margin-bottom:30px;
}

</style>

</head>

<body>

<header>
<h2>Shoulder Exercises</h2>
<a href="index.html" class="home">Home</a>
</header>

<div class="container">


    <!-- MAIN IMAGE -->

<div class="mainImage">

<img src="images/shoulders.png">

</div>


<!-- FRONT DELTS -->

<div class="section">
<h2>Front Delts</h2>

<div class="exercise" data-exercise="front1"><img src="images/Shoulders/Pike-push-ups-are-one-of-the-best-bodyweight-shoulder-exercises-for-the-front-delts-1024x574.jpg"><div class="badge">DONE</div><div class="history"></div></div>

<div class="exercise" data-exercise="front2"><img src="images/Shoulders/The-kneeling-landmine-press-is-one-of-the-best-shoulder-exercises-to-do-because-it-works-your-core-1024x576.jpg"><div class="badge">DONE</div><div class="history"></div></div>

<div class="exercise" data-exercise="front3"><img src="images/Shoulders/Press-in-the-scapular-plane-for-all-pressing-movements-you-do-1024x573.jpg"><div class="badge">DONE</div><div class="history"></div></div>

</div>

<!-- SIDE DELTS -->

<div class="section">
<h2>Side Delts</h2>

<div class="exercise" data-exercise="side1"><img src="images/Shoulders/The-lean-away-cable-lateral-raise-works-the-side-delts-in-their-full-range-of-motion-1024x572.jpg"><div class="badge">DONE</div><div class="history"></div></div>

<div class="exercise" data-exercise="side2"><img src="images/Shoulders/Maintain-a-scapular-plane-on-the-lateral-dumbbell-raise-1024x575.jpg"><div class="badge">DONE</div><div class="history"></div></div>

<div class="exercise" data-exercise="side3"><img src="images/Shoulders/Think-about-pushing-your-elbows-outwards-on-the-movement-1024x572.jpg"><div class="badge">DONE</div><div class="history"></div></div>

</div>

<!-- REAR DELTS -->

<div class="section">
<h2>Rear Delts</h2>

<div class="exercise" data-exercise="rear1"><img src="images/Shoulders/Rear-delt-rows-are-one-of-the-best-shoulder-exercises-for-the-rear-delts-1024x571.jpg"><div class="badge">DONE</div><div class="history"></div></div>

<div class="exercise" data-exercise="rear2"><img src="images/Shoulders/How-to-perform-the-standing-barbell-rear-delt-row-for-maximum-rear-delts-activation-1024x568.jpg"><div class="badge">DONE</div><div class="history"></div></div>

<div class="exercise" data-exercise="rear3"><img src="images/Shoulders/How-to-perform-the-rear-delt-cable-row-1024x574.jpg"><div class="badge">DONE</div><div class="history"></div></div>

<div class="exercise" data-exercise="rear4"><img src="images/Shoulders/Before-and-after-reverse-flies-1024x578.png"><div class="badge">DONE</div><div class="history"></div></div>

</div>

<!-- PRESSING -->

<div class="section">
<h2>Pressing Movements</h2>

<div class="exercise" data-exercise="press1"><img src="images/Shoulders/How-to-set-up-for-the-dumbbell-shoulder-press-during-delts-workout-1024x575.png"><div class="badge">DONE</div><div class="history"></div></div>

<div class="exercise" data-exercise="press2"><img src="images/Shoulders/Seated-dumbbell-presses-give-you-more-stability-but-be-mindful-of-your-arm-path-1024x577.jpg"><div class="badge">DONE</div><div class="history"></div></div>

<div class="exercise" data-exercise="press3"><img src="images/Shoulders/Shoulder-mobility-on-the-dumbbell-shoulder-press-1024x576.png"><div class="badge">DONE</div><div class="history"></div></div>

<div class="exercise" data-exercise="press4"><img src="images/Shoulders/Compound-exercises-upright-dumbbell-row-1024x576.png"><div class="badge">DONE</div><div class="history"></div></div>

<div class="exercise" data-exercise="press5"><img src="images/Shoulders/Compound-exercises-upright-dumbbell-row-form-cue-1024x576.png"><div class="badge">DONE</div><div class="history"></div></div>

</div>

<!-- TECHNIQUE -->

<div class="section">
<h2>Technique / Guidance</h2>

<div class="exercise" data-exercise="tech1"><img src="images/Shoulders/Full-delts-workout-1024x575.png"><div class="history"></div></div>

<div class="exercise" data-exercise="tech2"><img src="images/Shoulders/How-to-make-the-upright-rows-healthier-for-your-shoulders-1024x575.jpg"><div class="history"></div></div>

<div class="exercise" data-exercise="tech3"><img src="images/Shoulders/Incline-dumbbell-row-proper-form-1024x553.png"><div class="history"></div></div>

<div class="exercise" data-exercise="tech4"><img src="images/Shoulders/Incline-dumbbell-row-improper-form-1024x573.png"><div class="history"></div></div>

</div>

</div>

<script>

let items=document.querySelectorAll(".exercise")

items.forEach(el=>{

let clicks=0

el.addEventListener("click",function(){

clicks++

setTimeout(()=>{

if(clicks===1){
showHistory(el)
}

if(clicks===3){
markDone(el)
}

clicks=0

},300)

})

})

function markDone(el){

let name=el.dataset.exercise
let data=JSON.parse(localStorage.getItem(name))||[]

let today=new Date().toISOString().split("T")[0]

data.push(today)
localStorage.setItem(name,JSON.stringify(data))

let badge=el.querySelector(".badge")
if(badge) badge.style.display="block"

}

function showHistory(el){

let name=el.dataset.exercise
let box=el.querySelector(".history")

let data=JSON.parse(localStorage.getItem(name))||[]

let twoWeeksAgo=new Date()
twoWeeksAgo.setDate(twoWeeksAgo.getDate()-14)

let recent=data.filter(d=>new Date(d)>twoWeeksAgo)

if(recent.length===0){
box.innerHTML="No workouts last 2 weeks"
}else{
box.innerHTML="Last 2 weeks:<br>"+recent.join("<br>")
}

box.style.display="block"

setTimeout(()=>{
box.style.display="none"
},3000)

}

</script>

</body>
</html>
